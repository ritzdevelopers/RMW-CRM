# Render Blueprint for the MPF CRM backend.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: mpf-crm-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECURE
        value: "true"
      # Set these in the Render dashboard (secrets / managed DB):
      #   DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME
      #   CORS_ORIGINS  (your Vercel URL)
      #   APP_URL       (your Vercel URL)
      #   COOKIE_DOMAIN (your Render URL)
